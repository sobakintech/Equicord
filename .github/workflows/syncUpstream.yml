name: Sync Upstream

on:
    schedule:
        # Daily at 06:00 UTC
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write

env:
    UPSTREAM: https://github.com/Equicord/Equicord.git
    UPSTREAM_BRANCH: main

jobs:
    sync:
        name: Merge upstream into main
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Fetch upstream
              run: |
                  git remote add upstream "$UPSTREAM"
                  git fetch upstream "$UPSTREAM_BRANCH" --quiet

            - name: Sync
              run: |
                  ref="upstream/$UPSTREAM_BRANCH"

                  # main already contains everything from upstream? Nothing to do.
                  if git merge-base --is-ancestor "$ref" HEAD; then
                      echo "main is up to date with $ref. Nothing to do."
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Merge upstream. Conflicts always resolve in the fork's favor:
                  # -X ours keeps our side of conflicting hunks, and the loop below
                  # settles delete/modify conflicts the same way (our deletion or our
                  # file wins). Everything auto-resolved is listed in the job summary.
                  if ! git merge --no-edit "$ref"; then
                      conflicts=$(git diff --name-only --diff-filter=U)
                      git merge --abort
                      if ! git merge --no-edit -X ours "$ref"; then
                          git diff --name-only --diff-filter=U -z |
                              while IFS= read -r -d '' p; do
                                  if git checkout --ours -- "$p" 2>/dev/null; then
                                      git add -- "$p"
                                  else
                                      git rm -qf --ignore-unmatch -- "$p"
                                  fi
                              done
                          git commit --no-edit
                      fi
                      {
                          echo "### Conflicts auto-resolved (fork side kept)"
                          echo '```'
                          echo "$conflicts"
                          echo '```'
                      } >> "$GITHUB_STEP_SUMMARY"
                  fi

                  # Keep CLAUDE.md current with upstream's .rules dev guide (we don't track .rules
                  # ourselves). Regenerate it from upstream's copy, appending any local notes from
                  # CLAUDE.custom.md, and commit if it changed.
                  rules="$(git show "$ref:.rules" 2>/dev/null || true)"
                  if [ -n "$rules" ]; then
                      printf '%s\n' "$rules" > CLAUDE.md
                      if [ -f CLAUDE.custom.md ]; then
                          printf '\n' >> CLAUDE.md
                          cat CLAUDE.custom.md >> CLAUDE.md
                      fi
                      if ! git diff --quiet -- CLAUDE.md; then
                          git add CLAUDE.md
                          git commit -m "docs: sync CLAUDE.md from upstream .rules"
                      fi
                  fi

                  # GITHUB_TOKEN can't push workflow file changes, so .github/workflows is
                  # fork-managed: revert anything the merge changed there and list it for
                  # manual review instead of failing the push.
                  if ! git diff --quiet origin/main HEAD -- .github/workflows; then
                      skipped=$(git diff --name-status origin/main HEAD -- .github/workflows)
                      git rm -rq --ignore-unmatch -- .github/workflows
                      git checkout origin/main -- .github/workflows
                      git commit -m "ci: skip upstream workflow changes"
                      {
                          echo "### Upstream workflow changes skipped (apply manually if wanted)"
                          echo '```'
                          echo "$skipped"
                          echo '```'
                      } >> "$GITHUB_STEP_SUMMARY"
                  fi

                  git push origin "HEAD:$UPSTREAM_BRANCH"
                  echo "Synced $ref into main."
