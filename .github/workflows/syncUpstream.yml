name: Sync Upstream

on:
    schedule:
        # Daily at 06:00 UTC
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

env:
    UPSTREAM: https://github.com/Equicord/Equicord.git
    UPSTREAM_BRANCH: main

jobs:
    sync:
        name: Open PR for new upstream commits
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Fetch upstream
              run: |
                  git remote add upstream "$UPSTREAM"
                  git fetch upstream "$UPSTREAM_BRANCH" --quiet

            - name: Open sync PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ref="upstream/$UPSTREAM_BRANCH"

                  # main already contains everything from upstream? Nothing to do.
                  if git merge-base --is-ancestor "$ref" HEAD; then
                      echo "main is up to date with $ref. Nothing to do."
                      exit 0
                  fi

                  # Don't stack PRs — if a sync PR is already open, leave it for review.
                  open=$(gh pr list --state open --json headRefName \
                      --jq '[.[] | select(.headRefName | startswith("upstream-sync/"))] | length')
                  if [ "$open" -gt 0 ]; then
                      echo "A sync PR is already open. Merge it before syncing again."
                      exit 0
                  fi

                  short=$(git rev-parse --short "$ref")
                  branch="upstream-sync/$short"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$branch"

                  conflicts=0
                  if ! git merge --no-edit "$ref"; then
                      conflicts=1
                      # Commit the conflicted state so the PR can be opened for manual resolution.
                      git add -A
                      git commit --no-edit
                  fi

                  git push origin "$branch"

                  commit_url="https://github.com/Equicord/Equicord/commit/$short"
                  if [ "$conflicts" = "1" ]; then
                      title="⚠️ Sync upstream ($short) — conflicts"
                      body="Automated sync with upstream [\`$short\`]($commit_url).\n\n**This merge has conflicts.** Resolve the conflict markers on this branch before merging."
                  else
                      title="Sync upstream ($short)"
                      body="Automated sync with upstream [\`$short\`]($commit_url).\n\nMerges cleanly. Review the changes and merge to stay up to date."
                  fi

                  printf "%b" "$body" | gh pr create \
                      --base main \
                      --head "$branch" \
                      --title "$title" \
                      --body-file -
