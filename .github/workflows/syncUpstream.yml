name: Sync Upstream

on:
    schedule:
        # Daily at 06:00 UTC
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

env:
    UPSTREAM: https://github.com/Equicord/Equicord.git
    UPSTREAM_BRANCH: main

jobs:
    sync:
        name: Merge upstream into main
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Fetch upstream
              run: |
                  git remote add upstream "$UPSTREAM"
                  git fetch upstream "$UPSTREAM_BRANCH" --quiet

            - name: Sync
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ref="upstream/$UPSTREAM_BRANCH"

                  # main already contains everything from upstream? Nothing to do.
                  if git merge-base --is-ancestor "$ref" HEAD; then
                      echo "main is up to date with $ref. Nothing to do."
                      exit 0
                  fi

                  # A conflict PR from a previous run is still open? Wait for it to be resolved.
                  open=$(gh pr list --state open --json headRefName \
                      --jq '[.[] | select(.headRefName | startswith("upstream-sync/"))] | length')
                  if [ "$open" -gt 0 ]; then
                      echo "An unresolved sync PR is already open. Resolve/merge it first."
                      exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Bring in upstream. On conflict, auto-resolve our fork-only files; only real
                  # code conflicts fall through to a PR.
                  if ! git merge --no-edit "$ref"; then
                      # Our version always wins for these: keep our copies, keep our deletions.
                      ours_keep=("CLAUDE.md" "CLAUDE.custom.md" "CONTRIBUTING.md")
                      ours_remove=(".rules" "AGENTS.md" "GEMINI.md" ".github/pull_request_template.md" ".github/ISSUE_TEMPLATE")
                      for p in "${ours_keep[@]}"; do
                          git checkout --ours -- "$p" 2>/dev/null || true
                          git add -- "$p" 2>/dev/null || true
                      done
                      for p in "${ours_remove[@]}"; do
                          git rm -rf --ignore-unmatch -- "$p" >/dev/null 2>&1 || true
                      done

                      # Real conflicts still remain — commit onto a branch and open a PR to resolve.
                      if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
                          short=$(git rev-parse --short "$ref")
                          branch="upstream-sync/$short"
                          git add -A
                          git commit --no-edit
                          git branch "$branch"
                          git push origin "$branch"
                          commit_url="https://github.com/Equicord/Equicord/commit/$short"
                          body="Auto-merging upstream [\`$short\`]($commit_url) hit **conflicts** with your own changes.\n\nResolve the conflict markers on this branch, then merge. Until this is merged, no further upstream syncs will run."
                          printf "%b" "$body" | gh pr create \
                              --base "$UPSTREAM_BRANCH" \
                              --head "$branch" \
                              --title "⚠️ Sync upstream ($short) — conflicts" \
                              --body-file -
                          exit 0
                      fi

                      # Only fork-only conflicts were auto-resolved — finish the merge commit.
                      git commit --no-edit
                  fi

                  # Keep CLAUDE.md current with upstream's .rules dev guide (we don't track .rules
                  # ourselves). Regenerate it from upstream's copy, appending any local notes from
                  # CLAUDE.custom.md, and commit if it changed.
                  rules="$(git show "$ref:.rules" 2>/dev/null || true)"
                  if [ -n "$rules" ]; then
                      printf '%s\n' "$rules" > CLAUDE.md
                      if [ -f CLAUDE.custom.md ]; then
                          printf '\n' >> CLAUDE.md
                          cat CLAUDE.custom.md >> CLAUDE.md
                      fi
                      if ! git diff --quiet -- CLAUDE.md; then
                          git add CLAUDE.md
                          git commit -m "docs: sync CLAUDE.md from upstream .rules"
                      fi
                  fi

                  git push origin "HEAD:$UPSTREAM_BRANCH"
                  echo "Synced $ref into main."
