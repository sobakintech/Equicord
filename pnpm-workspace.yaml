packages:
    - packages/*
peerDependencyRules:
    ignoreMissing:
        - eslint-plugin-import
        - eslint
allowedDeprecatedVersions:
    source-map-resolve: "*"
    resolve-url: "*"
    source-map-url: "*"
    urix: "*"
    q: "*"
strictPeerDependencies: false
allowBuilds:
    esbuild: true
pmOnFail: warn
verifyDepsBeforeRun: prompt
minimumReleaseAgeExclude:
    - "@song-spotlight/api@2.2.0"
